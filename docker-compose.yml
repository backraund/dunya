version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: dunya_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password

  minio:
    image: minio/minio:latest
    container_name: dunya_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"

  backend:
    build: 
      context: ./backend
    container_name: dunya_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MONGO_URI=mongodb://admin:password@mongodb:27017
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_PUBLIC_URL=http://localhost:9000
      - FRONTEND_PUBLIC_URL=http://localhost:5173
      - ADMIN_PASSWORD=gizlisifre
    depends_on:
      - mongodb
      - minio

  frontend:
    build:
      context: ./frontend
    container_name: dunya_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - default
      - onox-proxy

volumes:
  mongodb_data:
  minio_data:

networks:
  onox-proxy:
    external: true
    name: onox_onox-network
